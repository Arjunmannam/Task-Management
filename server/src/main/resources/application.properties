spring.application.name=unify-platform

# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/unify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────
jwt.secret=UnifyPlatformSuperSecretKey2025!#ChangeInProd
jwt.expiration=86400000

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=./uploads

# ── Server ────────────────────────────────────────────────
server.port=8080
